# SonarQube scanner configuration for the demo project.
# Use this when you want to run a real scan against the bundled demo:
#   1. cd demo/mock_providerportal_web
#   2. npm install
#   3. npm test
#   4. sonar-scanner -Dsonar.host.url=$SONAR_BASE_URL -Dsonar.token=$SONAR_TOKEN
#
# Mock-mode demos do not need this file; it exists so the demo project can be
# scanned by a real SonarQube server when desired.

sonar.projectKey=demo-providerportal-web
sonar.projectName=Demo Provider Portal Web
sonar.projectVersion=1.0.0

sonar.sources=src
sonar.tests=tests
sonar.test.inclusions=tests/**/*.test.js
sonar.exclusions=node_modules/**,coverage/**

sonar.sourceEncoding=UTF-8
sonar.javascript.lcov.reportPaths=coverage/lcov.info
